<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Thank You!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root{
      --bg:#f8fafc; --ink:#0f172a; --muted:#64748b; --card:#fff; --accent:#2563eb;
      --ring:#e5e7eb; --shadow:0 8px 30px rgba(2,6,23,.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--ink);
      font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial;
    }
    .wrap{max-width:700px;margin:40px auto;padding:0 20px}
    .card{
      background:#fff;border:1px solid var(--ring);border-radius:16px;
      padding:28px;box-shadow:var(--shadow);text-align:center;
    }
    h1{margin:0 0 12px;font-size:28px}
    p{margin:0 0 18px;color:var(--muted);font-size:17px}
    .btn{
      display:inline-block;margin-top:10px;text-decoration:none;font-weight:700;
      border-radius:10px;padding:10px 18px;border:1px solid #dbeafe;
      background:#eff6ff;color:var(--accent);transition:all .15s;cursor:pointer;
    }
    .btn:hover{background:var(--accent);color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Thank you!</h1>
      <p>Your responses have been recorded successfully.<br>
      You may now close this window or return to the main page.</p>
    </div>
  </div>
</body>
</html>
